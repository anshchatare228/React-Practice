<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Basic</title>
</head>
<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        const button = <button>hello</button>;
        const paragraph = <p>paragraph of text</p>;

        function ChatInput(){
            //return only takes one element thats why we put a fragment "<></>"
            return(
                <>                       
                    <input placeholder="Send your message" size="30" />
                    <button>Send</button>
                </>
            );

        }

        function ChatMessage(props){
            const message = props.message;
            const sender = props.sender;

            if(sender === "bot"){
                return(
                    <div>
                        <img src="robot.png" width="40" />
                        {message}
                    </div>
                );
            }

            return(
                <div>
                    {message}
                    <img src="user.png" width="40" />
                </div>
            );

        }

        function App() {
            return (
                <div>
                    <ChatInput />
                    <ChatMessage message="Hello chatbot" sender="user" />
                    <ChatMessage message="Hi! how can I help you ?" sender="bot" />
                    <ChatMessage message="Whats todays date ?" sender="user" />
                    <ChatMessage message="Today is 13th of March 2026" sender="bot" />
                </div>
            )
        } 

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>
</html>
